name: Criar Release

on:
  workflow_dispatch:
    inputs:
      versao_modo:
        description: "Versão"
        required: true
        default: "automatico"
        type: choice
        options:
          - automatico
          - manual
      versao_manual:
        description: "Versão manual (ex: v1.2.0) — ignorado se modo for automático"
        required: false
        default: ""
      nome_modo:
        description: "Nome do release"
        required: true
        default: "predefinido"
        type: choice
        options:
          - predefinido
          - manual
      nome_manual:
        description: "Nome manual do release — ignorado se modo for predefinido"
        required: false
        default: ""
      changelog_modo:
        description: "Changelog"
        required: true
        default: "automatico"
        type: choice
        options:
          - automatico
          - manual
      changelog_manual:
        description: "Changelog manual — ignorado se modo for automático"
        required: false
        default: ""
      criador_modo:
        description: "Criador do release"
        required: true
        default: "predefinido"
        type: choice
        options:
          - predefinido
          - manual
      criador_manual:
        description: "Criador manual — ignorado se modo for predefinido"
        required: false
        default: ""
      prerelease:
        description: "Marcar como pré-release?"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout código (histórico completo para changelog)
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Configurar Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '24'

      - name: Instalar dependências
        run: npm install --legacy-peer-deps

      - name: Resolver versão, nome e changelog
        id: meta
        shell: pwsh
        run: |
          # ── Versão ────────────────────────────────────────────────────
          $ultimaTag = git describe --tags --abbrev=0 2>$null
          $primeirRelease = -not $ultimaTag

          if ("${{ github.event.inputs.versao_modo }}" -eq "manual") {
            $tag = "${{ github.event.inputs.versao_manual }}".Trim()
            if (-not $tag) { Write-Error "Versão manual não informada."; exit 1 }
          } elseif ($primeirRelease) {
            # Sem nenhum release anterior: sempre começa em v1.0.0
            $tag = "v1.0.0"
            Write-Host "Sem releases anteriores — versão fixada em $tag"
          } else {
            # Já existe pelo menos um release: verifica se há commits novos
            $commitMessages = git log "$ultimaTag..HEAD" --pretty=format:"%s" --no-merges

            if (-not $commitMessages) {
              # Nenhum commit novo desde a última tag — usa a tag existente (ex: criada manualmente)
              $tag = $ultimaTag
              Write-Host "Nenhum commit novo desde $ultimaTag — usando tag existente"
            } else {
              # Há commits novos: faz bump semântico
              $baseVer = $ultimaTag.TrimStart("v")
              $parts = $baseVer -split "\."
              $major = [int]$parts[0]
              $minor = [int]$parts[1]
              $patch = [int]$parts[2]

              $hasBreaking = $commitMessages | Where-Object { $_ -match "BREAKING CHANGE|^.+!:" }
              $hasFeat     = $commitMessages | Where-Object { $_ -match "^feat(\(.+\))?:" }
              $hasFix      = $commitMessages | Where-Object { $_ -match "^fix(\(.+\))?:" }

              if ($hasBreaking) {
                $major++; $minor = 0; $patch = 0
                Write-Host "Bump: MAJOR (breaking change)"
              } elseif ($hasFeat) {
                $minor++; $patch = 0
                Write-Host "Bump: MINOR (feat detectado)"
              } elseif ($hasFix) {
                $patch++
                Write-Host "Bump: PATCH (fix detectado)"
              } else {
                $patch++
                Write-Host "Bump: PATCH (padrão — nenhum feat/fix convencional encontrado)"
              }

              $tag = "v$major.$minor.$patch"
            }
          }
          echo "tag=$tag" >> $env:GITHUB_OUTPUT

          # ── Nome ──────────────────────────────────────────────────────
          if ("${{ github.event.inputs.nome_modo }}" -eq "manual") {
            $nome = "${{ github.event.inputs.nome_manual }}".Trim()
            if (-not $nome) { Write-Error "Nome manual não informado."; exit 1 }
          } else {
            $nome = "TS4 Mod Manager $tag"
          }
          echo "nome=$nome" >> $env:GITHUB_OUTPUT

          # ── Changelog ─────────────────────────────────────────────────
          if ("${{ github.event.inputs.changelog_modo }}" -eq "manual") {
            $changelog = "${{ github.event.inputs.changelog_manual }}"
            if (-not $changelog) { $changelog = "Nova versão disponível." }
          } elseif ($primeirRelease) {
            # Sem releases anteriores: lista todos os commits desde o início do repositório
            $commits = git log --pretty=format:"- %s (%h)" --no-merges
            if ($commits) {
              $changelog = "## Histórico completo`n`n$($commits -join "`n")"
            } else {
              $changelog = "Versão inicial."
            }
            Write-Host "Primeiro release — usando git log completo desde o commit inicial"
          } else {
            # Já existe release anterior: lista apenas commits desde a última tag
            $commits = git log "$ultimaTag..HEAD" --pretty=format:"- %s (%h)" --no-merges
            if ($commits) {
              $changelog = "## O que mudou desde $ultimaTag`n`n$($commits -join "`n")"
            } elseif ($tag -eq $ultimaTag) {
              # Tag existente sem commits novos — usa log dos commits que fazem parte da tag
              $tagCommit = git rev-list -n 1 $ultimaTag
              $tagAnterior = git describe --tags --abbrev=0 "$tagCommit^" 2>$null
              if ($tagAnterior) {
                $commitsTag = git log "$tagAnterior..$ultimaTag" --pretty=format:"- %s (%h)" --no-merges
                if ($commitsTag) {
                  $changelog = "## O que mudou em $ultimaTag`n`n$($commitsTag -join "`n")"
                } else {
                  $changelog = "Nova versão disponível."
                }
              } else {
                $changelog = "Nova versão disponível."
              }
            } else {
              $changelog = "Nova versão disponível."
            }
          }
          # Salva changelog em arquivo para evitar problemas com multiline no output
          $changelog | Out-File -FilePath "RELEASE_NOTES.md" -Encoding utf8

          # ── Criador ───────────────────────────────────────────────────
          if ("${{ github.event.inputs.criador_modo }}" -eq "manual") {
            $criador = "${{ github.event.inputs.criador_manual }}".Trim()
            if (-not $criador) { Write-Error "Criador manual não informado."; exit 1 }
          } else {
            $pkg = Get-Content "package.json" | ConvertFrom-Json
            $criador = $pkg.author
          }
          echo "criador=$criador" >> $env:GITHUB_OUTPUT

      - name: Sincronizar versão e criador do package.json com a tag
        shell: pwsh
        run: |
          $tag = "${{ steps.meta.outputs.tag }}".TrimStart("v")
          $criador = "${{ steps.meta.outputs.criador }}"
          $pkg = Get-Content "package.json" -Raw | ConvertFrom-Json
          $changed = $false
          if ($pkg.version -ne $tag) {
            $pkg.version = $tag
            $changed = $true
            Write-Host "package.json: versão atualizada para $tag"
          } else {
            Write-Host "package.json: versão já está em $tag"
          }
          if ($criador -and $pkg.author -ne $criador) {
            $pkg.author = $criador
            $changed = $true
            Write-Host "package.json: criador atualizado para '$criador'"
          } else {
            Write-Host "package.json: criador já está como '$($pkg.author)'"
          }
          if ($changed) {
            $pkg | ConvertTo-Json -Depth 10 | Set-Content "package.json" -Encoding utf8
          }
          # Exporta flag para o próximo step saber se precisa commitar
          echo "changed=$($changed.ToString().ToLower())" >> $env:GITHUB_OUTPUT
        id: sync_pkg

      - name: Commitar package.json atualizado
        if: steps.sync_pkg.outputs.changed == 'true'
        shell: pwsh
        run: |
          $tag = "${{ steps.meta.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump version para $tag [skip ci]"
          git push origin HEAD:main
          Write-Host "package.json commitado e enviado para o repositório"

      - name: Build do instalador Windows
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Renomear EXEs para incluir versão e tipo
        shell: pwsh
        run: |
          $tag = "${{ steps.meta.outputs.tag }}"
          $version = $tag.TrimStart("v")

          # Portable: qualquer .exe que não seja Setup
          $portable = Get-ChildItem "dist\*.exe" | Where-Object { $_.Name -notlike "*Setup*" } | Select-Object -First 1
          if ($portable) {
            $newName = "TS4.Mod.Manager.Portable.$version.exe"
            Rename-Item -Path $portable.FullName -NewName $newName
            Write-Host "Portable: $($portable.Name) -> $newName"
          }

          # Installer (Setup)
          $setup = Get-ChildItem "dist\*.exe" | Where-Object { $_.Name -like "*Setup*" } | Select-Object -First 1
          if ($setup) {
            $newName = "TS4.Mod.Manager.Setup.$version.exe"
            Rename-Item -Path $setup.FullName -NewName $newName
            Write-Host "Setup: $($setup.Name) -> $newName"
          }

      - name: Criar Release com o EXE
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.nome }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ github.event.inputs.prerelease }}
          files: dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
