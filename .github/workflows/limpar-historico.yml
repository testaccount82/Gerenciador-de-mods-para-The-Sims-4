name: Limpar Histórico de Execuções

on:
  workflow_dispatch:
    inputs:
      workflow:
        description: "Qual histórico limpar?"
        required: true
        type: choice
        options:
          - Todos
          - Criar Artefatos
          - Criar Release
          - Testes
          - Limpar Histórico de Execuções
      extras:
        description: "Limpeza extra (além do histórico)?"
        required: false
        type: choice
        default: Nenhuma
        options:
          - Nenhuma
          - Releases e tags
          - Artefatos
          - Releases, tags e artefatos

permissions:
  actions: write
  contents: write

jobs:
  limpar:
    runs-on: ubuntu-latest

    steps:
      - name: Limpar execuções antigas
        uses: actions/github-script@v7
        with:
          script: |
            const escolha = "${{ github.event.inputs.workflow }}";
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            let runs = [];
            let page = 1;

            while (true) {
              const { data } = await github.rest.actions.listWorkflowRunsForRepo({
                owner,
                repo,
                per_page: 100,
                page,
              });

              if (data.workflow_runs.length === 0) break;
              runs = runs.concat(data.workflow_runs);
              page++;
            }

            if (escolha !== "Todos") {
              runs = runs.filter(r => r.name === escolha);
            }

            // Só apaga execuções já concluídas e ignora a atual
            runs = runs.filter(r => r.id !== context.runId && r.status === "completed");

            console.log(`Encontradas ${runs.length} execuções para deletar.`);

            let deletados = 0;
            let ignorados = 0;

            for (const run of runs) {
              try {
                await github.rest.actions.deleteWorkflowRun({
                  owner,
                  repo,
                  run_id: run.id,
                });
                console.log(`Deletado: [${run.name}] #${run.run_number}`);
                deletados++;
              } catch (e) {
                console.log(`Ignorado: [${run.name}] #${run.run_number} — ${e.message}`);
                ignorados++;
              }
            }

            console.log(`Concluído! ${deletados} deletados, ${ignorados} ignorados.`);

      - name: Apagar releases e tags
        if: contains(github.event.inputs.extras, 'Releases')
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            let releases = [];
            let page = 1;
            while (true) {
              const { data } = await github.rest.repos.listReleases({ owner, repo, per_page: 100, page });
              if (data.length === 0) break;
              releases = releases.concat(data);
              page++;
            }

            console.log(`Encontradas ${releases.length} release(s) para deletar.`);

            let relDeletadas = 0;
            let tagsDeletadas = 0;

            for (const release of releases) {
              const tag = release.tag_name;
              try {
                await github.rest.repos.deleteRelease({ owner, repo, release_id: release.id });
                console.log(`Release deletada: ${release.name || tag}`);
                relDeletadas++;
              } catch (e) {
                console.log(`Erro ao deletar release ${tag}: ${e.message}`);
              }
              try {
                await github.rest.git.deleteRef({ owner, repo, ref: `tags/${tag}` });
                console.log(`Tag deletada: ${tag}`);
                tagsDeletadas++;
              } catch (e) {
                console.log(`Erro ao deletar tag ${tag}: ${e.message}`);
              }
            }

            console.log(`Concluído! ${relDeletadas} release(s) e ${tagsDeletadas} tag(s) deletadas.`);

      - name: Apagar artefatos
        if: contains(github.event.inputs.extras, 'Artefatos')
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            let artifacts = [];
            let page = 1;
            while (true) {
              const { data } = await github.rest.actions.listArtifactsForRepo({ owner, repo, per_page: 100, page });
              if (data.artifacts.length === 0) break;
              artifacts = artifacts.concat(data.artifacts);
              page++;
            }

            console.log(`Encontrados ${artifacts.length} artefato(s) para deletar.`);

            let deletados = 0;
            for (const artifact of artifacts) {
              try {
                await github.rest.actions.deleteArtifact({ owner, repo, artifact_id: artifact.id });
                console.log(`Artefato deletado: ${artifact.name}`);
                deletados++;
              } catch (e) {
                console.log(`Erro ao deletar artefato ${artifact.name}: ${e.message}`);
              }
            }

            console.log(`Concluído! ${deletados} artefato(s) deletados.`);
