name: 🧹 Limpar Histórico de Execuções

on:
  workflow_dispatch:
    inputs:
      workflow:
        description: "Histórico a limpar"
        required: true
        type: choice
        default: Todos
        options:
          - Todos
          - Criar Artefatos
          - Criar Release
          - Testes
          - Limpar Histórico de Execuções
      apagar_releases:
        description: "Apagar releases e tags"
        required: false
        default: false
        type: boolean
      apagar_artefatos:
        description: "Apagar artefatos"
        required: false
        default: false
        type: boolean
      apagar_caches:
        description: "Apagar caches"
        required: false
        default: false
        type: boolean

permissions:
  actions: write
  contents: write

jobs:
  limpar:
    name: Limpar repositório
    runs-on: ubuntu-latest

    env:
      WORKFLOW_ALVO: ${{ github.event.inputs.workflow }}

    steps:
      - name: 🗂️ Limpar histórico de execuções
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const alvo = process.env.WORKFLOW_ALVO;

            const runs = [];
            for (let page = 1; ; page++) {
              const { data } = await github.rest.actions.listWorkflowRunsForRepo({
                owner, repo, per_page: 100, page,
              });
              if (!data.workflow_runs.length) break;
              runs.push(...data.workflow_runs);
            }

            const para_deletar = runs.filter(r =>
              r.id !== context.runId &&
              r.status === 'completed' &&
              (alvo === 'Todos' || r.name === alvo)
            );

            console.log(`🔍 ${para_deletar.length} execução(ões) encontrada(s).`);

            let ok = 0, falhou = 0;
            for (const run of para_deletar) {
              try {
                await github.rest.actions.deleteWorkflowRun({ owner, repo, run_id: run.id });
                console.log(`  ✅ [${run.name}] #${run.run_number}`);
                ok++;
              } catch (e) {
                console.log(`  ⚠️  [${run.name}] #${run.run_number} — ${e.message}`);
                falhou++;
              }
            }

            console.log(`\n📊 ${ok} deletado(s), ${falhou} ignorado(s).`);

      - name: 🏷️ Apagar releases e tags
        if: ${{ github.event.inputs.apagar_releases == 'true' }}
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;

            const releases = [];
            for (let page = 1; ; page++) {
              const { data } = await github.rest.repos.listReleases({ owner, repo, per_page: 100, page });
              if (!data.length) break;
              releases.push(...data);
            }

            console.log(`🔍 ${releases.length} release(s) encontrada(s).`);

            let relOk = 0, tagOk = 0, falhou = 0;
            for (const release of releases) {
              const tag = release.tag_name;
              try {
                await github.rest.repos.deleteRelease({ owner, repo, release_id: release.id });
                console.log(`  ✅ Release: ${release.name || tag}`);
                relOk++;
              } catch (e) {
                console.log(`  ⚠️  Release ${tag}: ${e.message}`);
                falhou++;
              }
              try {
                await github.rest.git.deleteRef({ owner, repo, ref: `tags/${tag}` });
                console.log(`  ✅ Tag: ${tag}`);
                tagOk++;
              } catch (e) {
                console.log(`  ⚠️  Tag ${tag}: ${e.message}`);
              }
            }

            console.log(`\n📊 ${relOk} release(s) e ${tagOk} tag(s) deletadas, ${falhou} erro(s).`);

      - name: 📦 Apagar artefatos
        if: ${{ github.event.inputs.apagar_artefatos == 'true' }}
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;

            const artifacts = [];
            for (let page = 1; ; page++) {
              const { data } = await github.rest.actions.listArtifactsForRepo({ owner, repo, per_page: 100, page });
              if (!data.artifacts.length) break;
              artifacts.push(...data.artifacts);
            }

            console.log(`🔍 ${artifacts.length} artefato(s) encontrado(s).`);

            let ok = 0, falhou = 0;
            for (const artifact of artifacts) {
              try {
                await github.rest.actions.deleteArtifact({ owner, repo, artifact_id: artifact.id });
                console.log(`  ✅ ${artifact.name}`);
                ok++;
              } catch (e) {
                console.log(`  ⚠️  ${artifact.name}: ${e.message}`);
                falhou++;
              }
            }

            console.log(`\n📊 ${ok} artefato(s) deletado(s), ${falhou} erro(s).`);

      - name: 🗑️ Apagar caches
        if: ${{ github.event.inputs.apagar_caches == 'true' }}
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;

            const caches = [];
            for (let page = 1; ; page++) {
              const { data } = await github.rest.actions.getActionsCacheList({ owner, repo, per_page: 100, page });
              if (!data.actions_caches.length) break;
              caches.push(...data.actions_caches);
            }

            console.log(`🔍 ${caches.length} cache(s) encontrado(s).`);

            let ok = 0, falhou = 0;
            for (const cache of caches) {
              try {
                await github.rest.actions.deleteActionsCacheById({ owner, repo, cache_id: cache.id });
                console.log(`  ✅ ${cache.key}`);
                ok++;
              } catch (e) {
                console.log(`  ⚠️  ${cache.key}: ${e.message}`);
                falhou++;
              }
            }

            console.log(`\n📊 ${ok} cache(s) deletado(s), ${falhou} erro(s).`);
