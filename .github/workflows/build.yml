name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Build do instalador Windows
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Listar arquivos gerados
        run: Get-ChildItem -Recurse dist\
        shell: pwsh

      - name: Upload do artefato (instalador)
        uses: actions/upload-artifact@v4
        with:
          name: TS4-Mod-Manager-Windows
          path: |
            dist/*.exe
            dist/*.zip
          retention-days: 30

      - name: Criar Release com o EXE
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.1.0
          name: "TS4 Mod Manager v1.1.0"
          body: |
            ## TS4 Mod Manager v1.1.0 🎮

            ### 🐛 Correções
            - Detecção real das pastas Mods e Tray via `fs.existsSync` (antes qualquer caminho era marcado como detectado)
            - Removido `...` na coluna de checkbox da tabela de mods
            - Filtro de pastas não exibe mais `/` como opção
            - Ícone da janela trocado de escudo para controle de videogame
            - Cor de destaque alterada para azul Fluent (#0078D4)
            - Caminho completo do arquivo exibido nos cards de conflito
            - Desfazer disponível ao deletar arquivos na página de Conflitos
          draft: false
          prerelease: false
          files: |
            dist/*.exe
            dist/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
