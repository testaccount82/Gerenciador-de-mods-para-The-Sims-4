name: Criar Artefatos

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Testes"]
    types:
      - completed
    branches:
      - main

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: windows-latest
    # Only run automatically when tests passed (manual dispatch always runs)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deletar artefatos antigos
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const nomesAlvo = [
              "TS4 Mod Manager Instalador Windows",
              "TS4 Mod Manager Portable Windows"
            ];

            for (const nome of nomesAlvo) {
              const { data } = await github.rest.actions.listArtifactsForRepo({
                owner, repo, name: nome, per_page: 100
              });
              for (const artifact of data.artifacts) {
                await github.rest.actions.deleteArtifact({ owner, repo, artifact_id: artifact.id });
                console.log(`Deletado: ${artifact.name} (id ${artifact.id})`);
              }
            }

      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar dependencias
        run: npm install --legacy-peer-deps

      - name: Build do instalador Windows
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Listar arquivos gerados
        run: Get-ChildItem -Recurse dist\
        shell: pwsh

      - name: Renomear portable para nome mais descritivo
        shell: pwsh
        run: |
          $portable = Get-ChildItem "dist\*.exe" | Where-Object { $_.Name -notlike "*Setup*" }
          if ($portable) {
            $newName = $portable.Name -replace "^TS4 Mod Manager ", "TS4 Mod Manager Portable "
            Rename-Item -Path $portable.FullName -NewName $newName
            Write-Host "Renomeado: $($portable.Name) -> $newName"
          }

      - name: Upload do instalador
        uses: actions/upload-artifact@v4
        with:
          name: TS4 Mod Manager Instalador Windows
          path: dist/*Setup*.exe
          retention-days: 30

      - name: Upload do portable
        uses: actions/upload-artifact@v4
        with:
          name: TS4 Mod Manager Portable Windows
          path: dist/*Portable*.exe
          retention-days: 30
