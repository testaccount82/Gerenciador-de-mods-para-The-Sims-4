<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" />
  <title>TS4 Mod Manager — Debug</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0d0d;
      --surface:   #161616;
      --border:    #2a2a2a;
      --text:      #e0e0e0;
      --text-dim:  #888;
      --accent:    #4fc3f7;
      --warn:      #ffb74d;
      --error:     #ef5350;
      --info:      #81c784;
      --debug:     #ce93d8;
      --scrollbar: #2e2e2e;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Consolas', 'Menlo', monospace; font-size: 12px; }

    /* ── Toolbar ── */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      -webkit-app-region: drag;
      user-select: none;
    }
    #toolbar > * { -webkit-app-region: no-drag; }
    #toolbar h1 { font-size: 13px; font-weight: 600; color: var(--accent); flex: 1; }
    #toolbar span#status-badge {
      font-size: 11px; padding: 2px 8px; border-radius: 4px;
      background: #1e3a1e; color: var(--info); border: 1px solid #2e5a2e;
    }
    #toolbar span#status-badge.off { background: #2a1e1e; color: var(--error); border-color: #5a2e2e; }

    button {
      padding: 4px 10px; border-radius: 4px; border: 1px solid var(--border);
      background: #222; color: var(--text); cursor: pointer; font-size: 12px;
      transition: background 0.15s;
    }
    button:hover { background: #2e2e2e; }

    /* ── Filter bar ── */
    #filterbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    #filterbar label { font-size: 11px; color: var(--text-dim); }
    #filter-input {
      flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
      color: var(--text); padding: 3px 8px; font-family: inherit; font-size: 12px;
    }
    #filter-input:focus { outline: 1px solid var(--accent); }
    .level-btn { padding: 3px 8px; font-size: 11px; opacity: 0.5; }
    .level-btn.active { opacity: 1; border-color: var(--accent); color: var(--accent); }
    #count { font-size: 11px; color: var(--text-dim); min-width: 60px; text-align: right; }

    /* ── Log output ── */
    #log-container {
      position: absolute;
      top: 94px; /* toolbar + filterbar */
      left: 0; right: 0; bottom: 0;
      overflow-y: auto;
      padding: 6px 0;
    }
    #log-container::-webkit-scrollbar { width: 8px; }
    #log-container::-webkit-scrollbar-track { background: var(--bg); }
    #log-container::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 4px; }

    .log-line {
      display: flex;
      padding: 1px 12px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .log-line:hover { background: rgba(255,255,255,0.03); }
    .log-line.hidden { display: none; }

    .ts   { color: var(--text-dim); flex-shrink: 0; margin-right: 6px; }
    .lvl  { flex-shrink: 0; margin-right: 8px; font-weight: 700; width: 38px; }
    .msg  { flex: 1; }

    .lvl-INFO  { color: var(--info); }
    .lvl-WARN  { color: var(--warn); }
    .lvl-ERROR { color: var(--error); }
    .lvl-DEBUG { color: var(--debug); }

    /* ── Empty state ── */
    #empty-msg {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      color: var(--text-dim); text-align: center; pointer-events: none;
    }
    #empty-msg p { margin-top: 8px; font-size: 13px; }
    #empty-msg small { font-size: 11px; }

    #log-path-info {
      padding: 4px 12px 6px;
      color: var(--text-dim);
      font-size: 10px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
  </style>
</head>
<body>

  <div id="toolbar">
    <h1>🐛 Debug — TS4 Mod Manager</h1>
    <span id="status-badge">● ATIVO</span>
    <button id="btn-open-file" title="Abrir arquivo de log no editor padrão">📂 Abrir arquivo</button>
    <button id="btn-refresh" title="Recarregar log do arquivo">↺ Atualizar</button>
    <button id="btn-scroll-bottom" title="Ir para o final">⬇ Final</button>
    <button id="btn-clear" title="Limpar arquivo de log" style="color:#ef5350">🗑 Limpar</button>
  </div>

  <div id="log-path-info" id="log-path-bar">Carregando...</div>

  <div id="filterbar">
    <label>Filtrar:</label>
    <input id="filter-input" type="text" placeholder="texto para filtrar..." spellcheck="false" />
    <button class="level-btn active" data-level="ALL">Todos</button>
    <button class="level-btn" data-level="INFO"  style="color:#81c784">INFO</button>
    <button class="level-btn" data-level="WARN"  style="color:#ffb74d">WARN</button>
    <button class="level-btn" data-level="ERROR" style="color:#ef5350">ERROR</button>
    <button class="level-btn" data-level="DEBUG" style="color:#ce93d8">DEBUG</button>
    <label id="count">0 linhas</label>
  </div>

  <div id="log-container">
    <div id="empty-msg">
      <p>Nenhum log encontrado</p>
      <small>Ative o modo de depuração nas Configurações<br>ou inicie o programa com o parâmetro <code>--debug</code></small>
    </div>
  </div>

  <script>
    'use strict';

    const container   = document.getElementById('log-container');
    const emptyMsg    = document.getElementById('empty-msg');
    const countEl     = document.getElementById('count');
    const filterInput = document.getElementById('filter-input');
    const statusBadge = document.getElementById('status-badge');
    const pathInfo    = document.getElementById('log-path-info');

    let activeLevel = 'ALL';
    let filterText  = '';
    let autoScroll  = true;
    let totalLines  = 0;

    // ── Parsing ──────────────────────────────────────────────────────────────
    // Line format: [2025-01-01T00:00:00.000Z] [INFO ] message
    const LINE_RE = /^\[(\d{4}-\d{2}-\d{2}T[\d:.]+Z)\]\s+\[(\w+)\s*\]\s(.*)$/;

    function parseLine(raw) {
      const m = raw.match(LINE_RE);
      if (m) return { ts: m[1], level: m[2].trim(), msg: m[3] };
      return { ts: '', level: 'INFO', msg: raw };
    }

    function formatTs(isoStr) {
      if (!isoStr) return '';
      // Show as HH:MM:SS.mmm (local time) for compact display
      try {
        const d = new Date(isoStr);
        const hh = String(d.getHours()).padStart(2,'0');
        const mm = String(d.getMinutes()).padStart(2,'0');
        const ss = String(d.getSeconds()).padStart(2,'0');
        const ms = String(d.getMilliseconds()).padStart(3,'0');
        return `${hh}:${mm}:${ss}.${ms}`;
      } catch { return isoStr; }
    }

    // ── Visibility ───────────────────────────────────────────────────────────
    function lineVisible(entry) {
      if (activeLevel !== 'ALL' && entry.level !== activeLevel) return false;
      if (filterText && !entry.raw.toLowerCase().includes(filterText)) return false;
      return true;
    }

    function applyFilters() {
      let visible = 0;
      container.querySelectorAll('.log-line').forEach(el => {
        const show = lineVisible({ level: el.dataset.level, raw: el.dataset.raw });
        el.classList.toggle('hidden', !show);
        if (show) visible++;
      });
      countEl.textContent = `${visible} / ${totalLines}`;
      emptyMsg.style.display = totalLines === 0 ? 'block' : 'none';
    }

    // ── Render ───────────────────────────────────────────────────────────────
    function createLineEl(raw) {
      const p = parseLine(raw);
      const el = document.createElement('div');
      el.className = 'log-line';
      el.dataset.level = p.level;
      el.dataset.raw   = raw.toLowerCase();
      el.innerHTML =
        `<span class="ts">${formatTs(p.ts)}</span>` +
        `<span class="lvl lvl-${p.level}">${p.level}</span>` +
        `<span class="msg">${escapeHtml(p.msg)}</span>`;
      if (!lineVisible({ level: p.level, raw: el.dataset.raw })) el.classList.add('hidden');
      return el;
    }

    function escapeHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function renderAll(text) {
      // Remove the empty-msg placeholder but keep it in DOM (toggle display)
      container.innerHTML = '';
      container.appendChild(emptyMsg);
      totalLines = 0;
      let visible = 0;
      const lines = text.split('\n');
      const frag = document.createDocumentFragment();
      for (const raw of lines) {
        if (!raw.trim()) continue;
        totalLines++;
        const el = createLineEl(raw);
        if (!el.classList.contains('hidden')) visible++;
        frag.appendChild(el);
      }
      container.appendChild(frag);
      countEl.textContent = `${visible} / ${totalLines}`;
      emptyMsg.style.display = totalLines === 0 ? 'block' : 'none';
    }

    function appendLine(raw) {
      if (!raw.trim()) return;
      totalLines++;
      const el = createLineEl(raw);
      container.appendChild(el);
      // Update count
      const cur = countEl.textContent.match(/(\d+)\s*\/\s*(\d+)/);
      const vis = cur ? parseInt(cur[1]) + (el.classList.contains('hidden') ? 0 : 1) : '?';
      countEl.textContent = `${vis} / ${totalLines}`;
      emptyMsg.style.display = 'none';
      if (autoScroll && !el.classList.contains('hidden')) {
        container.scrollTop = container.scrollHeight;
      }
    }

    // ── Load ─────────────────────────────────────────────────────────────────
    async function loadLog() {
      try {
        const text = await window.debugApi.getLog();
        renderAll(text || '');
        if (autoScroll) container.scrollTop = container.scrollHeight;
      } catch (e) {
        renderAll(`[erro ao carregar log: ${e.message}]`);
      }
    }

    async function loadStatus() {
      try {
        const s = await window.debugApi.getStatus();
        if (s.enabled) {
          statusBadge.textContent = '● ATIVO';
          statusBadge.classList.remove('off');
        } else {
          statusBadge.textContent = '○ INATIVO';
          statusBadge.classList.add('off');
        }
        pathInfo.textContent = `Log: ${s.logPath}`;
      } catch (_) {}
    }

    // ── Auto-scroll detection ─────────────────────────────────────────────────
    container.addEventListener('scroll', () => {
      const nearBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 60;
      autoScroll = nearBottom;
    });

    // ── Controls ─────────────────────────────────────────────────────────────
    document.getElementById('btn-refresh').addEventListener('click', loadLog);
    document.getElementById('btn-open-file').addEventListener('click', () => window.debugApi.openLogFile());
    document.getElementById('btn-scroll-bottom').addEventListener('click', () => {
      autoScroll = true;
      container.scrollTop = container.scrollHeight;
    });
    document.getElementById('btn-clear').addEventListener('click', async () => {
      if (!confirm('Limpar todo o log de depuração?')) return;
      await window.debugApi.clearLog();
      renderAll('');
    });

    // Level filter buttons
    document.querySelectorAll('.level-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeLevel = btn.dataset.level;
        applyFilters();
      });
    });

    // Text filter
    let filterTimer;
    filterInput.addEventListener('input', () => {
      clearTimeout(filterTimer);
      filterTimer = setTimeout(() => {
        filterText = filterInput.value.toLowerCase().trim();
        applyFilters();
      }, 200);
    });

    // ── Real-time updates ─────────────────────────────────────────────────────
    window.debugApi.onLine(line => appendLine(line));

    // ── Init ─────────────────────────────────────────────────────────────────
    loadStatus();
    loadLog();
  </script>
</body>
</html>
