<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TS4 Mod Manager</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Custom Titlebar -->
  <div id="titlebar">
    <div id="titlebar-drag">
      <div id="app-logo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <rect x="2" y="6" width="20" height="12" rx="4" fill="var(--accent)" opacity="0.9"/>
          <line x1="7" y1="10" x2="7" y2="14" stroke="#000" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="5" y1="12" x2="9" y2="12" stroke="#000" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="16" cy="11" r="1.1" fill="#fff"/>
          <circle cx="18.2" cy="13" r="1.1" fill="#fff"/>
        </svg>
      </div>
      <span id="titlebar-title">TS4 Mod Manager</span>
    </div>
    <div id="window-controls">
      <button class="win-btn" id="btn-minimize" title="Minimizar">
        <svg width="10" height="1" viewBox="0 0 10 1"><rect width="10" height="1" fill="currentColor"/></svg>
      </button>
      <button class="win-btn" id="btn-maximize" title="Maximizar">
        <svg width="10" height="10" viewBox="0 0 10 10"><rect x="0.5" y="0.5" width="9" height="9" rx="1" stroke="currentColor" stroke-width="1" fill="none"/></svg>
      </button>
      <button class="win-btn close" id="btn-close" title="Fechar">
        <svg width="10" height="10" viewBox="0 0 10 10">
          <line x1="0" y1="0" x2="10" y2="10" stroke="currentColor" stroke-width="1.2"/>
          <line x1="10" y1="0" x2="0" y2="10" stroke="currentColor" stroke-width="1.2"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- App Layout -->
  <div id="app-layout">
    <!-- Sidebar Navigation -->
    <nav id="sidebar">
      <div id="nav-list">
        <button class="nav-item active" data-page="dashboard">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
            <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
          </svg>
          <span>Início</span>
        </button>
        <button class="nav-item" data-page="mods">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
            <path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
          </svg>
          <span>Mods</span>
        </button>
        <button class="nav-item" data-page="conflicts">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
            <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
            <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
          <span>Conflitos</span>
        </button>
        <button class="nav-item" data-page="organizer">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
            <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/>
            <line x1="12" y1="11" x2="12" y2="17"/><path d="M9 14l3-3 3 3"/>
          </svg>
          <span>Organizar</span>
        </button>
        <button class="nav-item" data-page="manual">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
            <path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/>
            <path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/>
          </svg>
          <span>Manual</span>
        </button>
        <button class="nav-item" data-page="history">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
          <span>Histórico</span>
        </button>
        <button class="nav-item" data-page="trash">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
            <path d="M10 11v6"/><path d="M14 11v6"/>
            <path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/>
          </svg>
          <span>Lixeira</span>
        </button>
        <button class="nav-item nav-debug-btn hidden" id="sidebar-btn-debug">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
            <path d="M12 22c1.1 0 2-.9 2-2H10c0 1.1.9 2 2 2z"/>
            <path d="M18 16v-5a6 6 0 10-12 0v5l-2 2v1h16v-1l-2-2z"/>
            <line x1="12" y1="2" x2="12" y2="4"/>
          </svg>
          <span>Debug</span>
        </button>
        <button class="nav-item" data-page="settings">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
          </svg>
          <span>Configurações</span>
        </button>
      </div>
      <div id="sidebar-scan-indicator-organize" class="hidden">
        <div class="scan-indicator-header">
          <div class="scan-indicator-title">
            <div class="spinner" style="width:10px;height:10px;border-width:2px;flex-shrink:0"></div>
            Organizando
          </div>
        </div>
        <div id="scan-indicator-organize-text">Verificando arquivos…</div>
        <div class="scan-indicator-bar-bg">
          <div class="scan-indicator-bar" id="scan-indicator-organize-bar"></div>
        </div>
      </div>
      <div id="sidebar-scan-indicator-conflicts" class="hidden">
        <div class="scan-indicator-header">
          <div class="scan-indicator-title">
            <div class="spinner" style="width:10px;height:10px;border-width:2px;flex-shrink:0"></div>
            Conflitos
          </div>
          <button id="scan-indicator-stop" title="Parar verificação" style="color:#f85149">
            <svg width="8" height="8" viewBox="0 0 10 10" fill="currentColor"><rect width="10" height="10" rx="1.5"/></svg>
          </button>
        </div>
        <div id="scan-indicator-conflicts-text">Verificando hashes…</div>
        <div class="scan-indicator-bar-bg">
          <div class="scan-indicator-bar" id="scan-indicator-conflicts-bar"></div>
        </div>
      </div>
      <div id="sidebar-version"></div>
    </nav>

    <!-- Main Content -->
    <main id="content-area">
      <!-- Pages injected by renderer.js -->
      <div id="page-dashboard"  class="page active"></div>
      <div id="page-mods"       class="page"></div>
      <div id="page-conflicts"  class="page"></div>
      <div id="page-organizer"  class="page"></div>
      <div id="page-manual"     class="page"></div>
      <div id="page-history"    class="page"></div>
      <div id="page-trash"      class="page"></div>
      <div id="page-settings"   class="page"></div>
    </main>
  </div>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <!-- Modal overlay -->
  <div id="modal-overlay" class="hidden">
    <div id="modal-box">
      <div id="modal-header">
        <span id="modal-title"></span>
        <button id="modal-close-btn" class="icon-btn">✕</button>
      </div>
      <div id="modal-body"></div>
      <div id="modal-footer"></div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
